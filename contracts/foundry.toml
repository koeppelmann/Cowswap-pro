[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Pinned so the TwapSafeInitializer creation code (and thus its deterministic
# CREATE2 address) is reproducible across machines.
solc_version = "0.8.34"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
